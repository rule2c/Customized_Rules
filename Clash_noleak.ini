[custom]
;规则从上往下匹配，优先命中上位规则

;美国账户 / T-Mobile / PayPal / 身份类账号
ruleset=🇺🇸 美国账户,[]DOMAIN-SUFFIX,t-mobile.com
ruleset=🇺🇸 美国账户,[]DOMAIN-SUFFIX,tmobile.com
ruleset=🇺🇸 美国账户,[]DOMAIN-SUFFIX,t-mobilemoney.com
ruleset=🇺🇸 美国账户,[]DOMAIN-SUFFIX,sprint.com
