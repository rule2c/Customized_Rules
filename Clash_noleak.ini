;自定义代理
ruleset=🚀 手动选择,https://raw.githubusercontent.com/rule2c/Customized_Rules/refs/heads/main/rule/Custom_Proxy_Classical.list

;国内服务直连
#ruleset=🎯 全球直连,[]GEOSITE,google-cn
