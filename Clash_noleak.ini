[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响

; 固定走美国住宅 IP，不参与切换
ruleset=🤖 ChatAI,https://raw.githubusercontent.com/rule2c/Customized_Rules/refs/heads/main/rule/Chat-AI.list
ruleset=💳 PayPal,[]GEOSITE,paypal
ruleset=💳 PayPal,[]GEOIP,paypal,no-resolve
ruleset=🤖 AI服务,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🎥 流媒体,[]GEOSITE,netflix
ruleset=🎥 流媒体,[]GEOSITE,disney
ruleset=🎥 流媒体,[]GEOSITE,hbo
ruleset=🎥 流媒体,[]GEOSITE,primevideo
ruleset=🎶 TikTok,[]GEOSITE,tiktok
; 局域网与基础直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,https://raw.githubusercontent.com/rule2c/Customized_Rules/refs/heads/main/rule/Custom_Direct_Classical.list
; 自定义代理优先规则
ruleset=🚀 自动切换,https://raw.githubusercontent.com/rule2c/Customized_Rules/refs/heads/main/rule/Custom_Proxy_Classical.list
; 特定服务直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,https://raw.githubusercontent.com/rule2c/Customized_Rules/refs/heads/main/rule/Steam_CDN.list
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
; 常规出海业务 (主节点VMiss耗尽后切换住宅)
ruleset=Ⓜ️ 微软Bing,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Bing.list
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=🎮 游戏平台,[]GEOSITE,category-games
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest
; 兜底与防误杀
; 被墙的知名网站，正常走代理
ruleset=🚀 自动切换,[]GEOSITE,gfw
; 没在墙内名单里的其他知名国外网站，放行直连 (防误杀核心规则)
ruleset=🎯 全球直连,[]GEOSITE,geolocation-!cn
; 国内网站和IP直连
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
; 特殊端口与漏网之鱼
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位

; 住宅节点池
custom_proxy_group=🇺🇸 美国住宅`select`.*NoSLA-LAX_sb_xtls-reality.*
; 主备自动切换池
custom_proxy_group=🚀 自动切换`fallback`VMissLAX_sb-xtls-reality`NoSLA-LAX_sb_xtls-reality`VMLA-CC_xray-reality-vision`http://cp.cloudflare.com/generate_204`300,,50
; 强解锁业务分组
custom_proxy_group=🤖 ChatAI`select`[]🇺🇸 美国住宅
custom_proxy_group=💳 PayPal`select`[]🇺🇸 美国住宅
custom_proxy_group=🤖 AI服务`select`[]🇺🇸 美国住宅
custom_proxy_group=🎥 流媒体`select`[]🇺🇸 美国住宅
custom_proxy_group=🎶 TikTok`select`[]🇺🇸 美国住宅
; 常规出海分组
custom_proxy_group=💬 即时通讯`select`[]🚀 自动切换`[]🎯 全球直连
custom_proxy_group=🌐 社交媒体`select`[]🚀 自动切换`[]🎯 全球直连
custom_proxy_group=🚀 GitHub`select`[]🚀 自动切换`[]🎯 全球直连
custom_proxy_group=Ⓜ️ 微软Bing`select`[]🚀 自动切换`[]🎯 全球直连
custom_proxy_group=📢 谷歌FCM`select`[]🚀 自动切换`[]🎯 全球直连
custom_proxy_group=🇬 谷歌服务`select`[]🚀 自动切换`[]🎯 全球直连
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 自动切换
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 自动切换
custom_proxy_group=🎮 游戏平台`select`[]🎯 全球直连`[]🚀 自动切换
custom_proxy_group=🎮 Steam`select`[]🎯 全球直连`[]🚀 自动切换
custom_proxy_group=🚀 测速工具`select`[]🎯 全球直连`[]🚀 自动切换
; 兜底分组
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 自动切换`[]🎯 全球直连
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]🎯 全球直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT
;设置分组标志位结束

enable_rule_generator=true
overwrite_original_rules=true
